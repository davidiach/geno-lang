name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        python -m pip install --require-hashes -r requirements-dev.lock
        python -m pip install --require-hashes -r requirements-release.lock
        python -m pip install --no-deps --no-build-isolation -e .

    - name: Verify release tag matches package version
      run: python scripts/check_version_alignment.py --tag "${GITHUB_REF_NAME}"

    - name: Run release gate
      run: make release-check PYTHON=python

  build:
    needs: release-check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'

    - name: Install build tools
      run: python -m pip install --require-hashes -r requirements-release.lock

    - name: Build package
      run: python -m build --no-isolation

    - name: Validate artifact metadata
      run: python -m twine check --strict dist/*

    - name: Smoke test wheel
      run: |
        python -m venv .venv-wheel
        . .venv-wheel/bin/activate
        python -m pip install --require-hashes -r requirements.lock
        python -m pip install --no-deps dist/*.whl
        python scripts/smoke_installed_geno.py

    - name: Smoke test sdist
      run: |
        python -m venv .venv-sdist
        . .venv-sdist/bin/activate
        python -m pip install --require-hashes -r requirements.lock
        python -m pip install --require-hashes -r requirements-release.lock
        python -m pip install --no-deps --no-build-isolation dist/*.tar.gz
        python scripts/smoke_installed_geno.py

    - name: Upload tested distributions
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: python-distributions
        path: dist/
        if-no-files-found: error
        retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing

    steps:
    - name: Download tested distributions
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-distributions
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1

  verify:
    needs: publish
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Extract version from tag
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'

    - name: Verify published package
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        installed=false
        for attempt in {1..10}; do
          if python -m pip install --no-cache-dir "geno-lang==${VERSION}"; then
            installed=true
            break
          fi
          if [ "$attempt" -lt 10 ]; then
            sleep 15
          fi
        done
        if [ "$installed" != true ]; then
          echo "Package did not become available on PyPI after 10 attempts" >&2
          exit 1
        fi
        python scripts/smoke_installed_geno.py
