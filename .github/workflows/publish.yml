name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,lsp]"

    - name: Verify release tag matches package version
      run: python scripts/check_version_alignment.py --tag "${GITHUB_REF_NAME}"

    - name: Run release gate
      run: make release-check PYTHON=python

  build-and-publish:
    needs: release-check
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine wheel "setuptools>=82.0.1"

    - name: Build package
      run: python -m build --no-isolation

    - name: Validate artifact metadata
      run: python -m twine check --strict dist/*

    - name: Smoke test wheel
      run: |
        python -m venv .venv-wheel
        . .venv-wheel/bin/activate
        pip install dist/*.whl
        python scripts/smoke_installed_geno.py

    - name: Smoke test sdist
      run: |
        python -m venv .venv-sdist
        . .venv-sdist/bin/activate
        pip install dist/*.tar.gz
        python scripts/smoke_installed_geno.py

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  verify:
    needs: build-and-publish
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Extract version from tag
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'

    - name: Verify published package
      run: |
        installed=false
        for attempt in {1..10}; do
          if python -m pip install --no-cache-dir "geno-lang==${{ steps.version.outputs.version }}"; then
            installed=true
            break
          fi
          if [ "$attempt" -lt 10 ]; then
            sleep 15
          fi
        done
        if [ "$installed" != true ]; then
          echo "Package did not become available on PyPI after 10 attempts" >&2
          exit 1
        fi
        python scripts/smoke_installed_geno.py
