name: Scheduled Quality

on:
  schedule:
    - cron: '17 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduled-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deep-conformance-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run frozen conformance corpus
        run: python scripts/run_conformance.py --all-retained --target all --require-node --json

      - name: Run deep differential fuzzing
        env:
          GENO_FUZZ_DEEP: '1'
        run: >-
          python -m pytest geno/tests/test_differential_fuzzing.py
          -q --tb=short --timeout=900

      - name: Retain minimized fuzz failures
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scheduled-fuzz-failures-${{ github.run_id }}
          path: |
            .hypothesis/
            geno/tests/fuzzing/failures/
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 30
