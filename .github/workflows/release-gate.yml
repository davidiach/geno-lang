name: Release Gate

# Template and example-app gates run here for fast feedback. The full release
# readiness gate is `make release-check`, run by ci.yml and publish.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20'

    - name: Install Geno
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Scaffold and smoke-test init templates
      run: PYTHON=python bash scripts/release-gate-templates.sh

    - name: Discover and validate example apps
      run: python scripts/release_gate_apps.py
