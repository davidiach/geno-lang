name: Release Gate

# Template and example-app gates run here for fast feedback. The full release
# readiness gate is `make release-check`, run by ci.yml and publish.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: '20'

    - name: Install Geno
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Scaffold and smoke-test init templates
      run: PYTHON=python bash scripts/release-gate-templates.sh

    - name: Discover and validate example apps
      run: python scripts/release_gate_apps.py
