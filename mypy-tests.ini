[mypy]
python_version = 3.10
files = geno/tests
ignore_missing_imports = True
warn_unused_configs = True
check_untyped_defs = True
follow_imports = skip
show_error_codes = True
no_error_summary = True
disable_error_code = no-redef, import-untyped, attr-defined, arg-type

# Tests intentionally pass invalid Python values into Geno internals to assert
# runtime and typechecker diagnostics. This profile is a staged typing surface,
# not yet a hard release gate.
allow_untyped_defs = True
allow_untyped_calls = True
