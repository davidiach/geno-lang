# Geno Target Definitions
#
# This file is the machine-readable source of truth for target-aware
# availability checks. The typechecker consumes it directly (P1-3).
# docs/SUPPORTED_TARGETS.md is generated from or manually synced with this file.
#
# Availability values:
#   "available"        - Always available on this target, no capability needed
#   "capability-gated" - Available when the corresponding --cap flag is granted
#   "unavailable"      - Not supported on this target (rejected at typecheck)

# ──────────────────────────────────────────────────────────────────────
# Target definitions
# ──────────────────────────────────────────────────────────────────────

[targets.python-cli]
description = "CLI and automation scripts running on the Python interpreter"
runtime = "python"
entry_command = "geno run"
compile_command = "geno compile -o app.py"
capabilities = ["fs", "http", "process", "env", "clock", "random", "print", "regex", "stdin", "serve"]

[targets.node-cli]
description = "CLI and automation scripts compiled to Node.js"
runtime = "node"
entry_command = "geno compile --target js -o app.js && node app.js"
compile_command = "geno compile --target js -o app.js"
capabilities = ["fs", "http", "env", "clock", "random", "print", "regex"]

[targets.browser]
description = "Browser apps compiled to static HTML/JS artifacts with canvas"
runtime = "browser"
entry_command = "geno build"
compile_command = "geno build -o dist/"
capabilities = ["http", "clock", "random", "print", "regex"]

[targets.python-hosted]
description = "Server handlers running in a hosted Python environment"
runtime = "python"
entry_command = "geno serve"
compile_command = "geno compile -o handler.py"
capabilities = ["fs", "http", "env", "clock", "random", "print", "regex", "serve"]

# ──────────────────────────────────────────────────────────────────────
# Builtin availability matrix
# ──────────────────────────────────────────────────────────────────────
# Each builtin lists its availability per target.
# Builtins not listed here are "available" on all targets by default.

# --- Pure builtins (available everywhere) ---
# The following categories are available on ALL targets with no capability gate:
#   List operations:      length, head, tail, append, concat, set_at, slice,
#                         filter, map, fold, contains, take_while, all, sort,
#                         sort_by, reverse, zip, enumerate, flat_map
#   String operations:    split, join, trim, to_lower, to_upper, replace,
#                         ends_with, split_once, starts_with, to_chars,
#                         sort_strings, contains_substring, repeat_string,
#                         substring, format, char_code, from_char_code
#   Math operations:      add, subtract, multiply, divide, sqrt, floor, ceil,
#                         round, max, abs, square, clamp, bit_or
#   Type predicates:      is_sorted, is_positive, is_numeric_string, is_permutation
#   Conversions:          parse_int, parse_float, to_string, float_to_int, int_to_float
#   Range:                range
#   Option operations:    is_some, is_none, unwrap, unwrap_or
#   Map operations:       map_insert, map_get
#   Array operations:     array_new, array_from_list, array_get, array_set,
#                         array_length, array_to_list, array_fill, array_copy
#   Vec operations:       vec_new, vec_from_list, vec_push, vec_pop, vec_get,
#                         vec_set, vec_length, vec_to_list
#   MutableMap operations: mutable_map_new, mutable_map_set, mutable_map_get,
#                          mutable_map_contains, mutable_map_delete,
#                          mutable_map_size, mutable_map_keys
#   Set operations:       set_new, set_from_list, set_add, set_remove,
#                         set_contains, set_size, set_to_list, set_union,
#                         set_intersection
#   JSON/Data:            json_parse, json_stringify, csv_parse,
#                         csv_parse_with_headers, toml_parse

