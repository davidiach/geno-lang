problem:
  id: "PROB-019"
  name: "Two Sum"
  difficulty: "medium"
  domain: "arrays"
  description: |
    Given a list of integers and a target sum, find two distinct indices such that
    the values at those indices add up to the target. Return the indices as a list [i, j]
    where i < j. If no solution exists, return an empty list.
  signature:
    function_name: "two_sum"
    inputs:
      - name: "nums"
        type: "List[Int]"
      - name: "target"
        type: "Int"
    output:
      name: "result"
      type: "List[Int]"
  examples:
    visible:
      - input: [[2, 7, 11, 15], 9]
        output: [0, 1]
        description: "nums[0] + nums[1] = 2 + 7 = 9"
      - input: [[3, 2, 4], 6]
        output: [1, 2]
        description: "nums[1] + nums[2] = 2 + 4 = 6"
    hidden:
      - input: [[], 10]
        output: []
        description: "Empty list"
      - input: [[1, 2, 3, 4, 5], 9]
        output: [3, 4]
        description: "4 + 5 = 9"
      - input: [[1, 2, 3], 10]
        output: []
        description: "No solution"
      - input: [[5, 5], 10]
        output: [0, 1]
        description: "Same values"
      - input: [[-1, -2, -3, -4], -5]
        output: [0, 3]
        description: "Negative numbers"
  constraints:
    - "Each input has at most one solution"
    - "Return empty list if no solution"
  canonical_solutions:
    geno: |
      func two_sum(nums: List[Int], target: Int) -> List[Int]
          example [2, 7, 11, 15], 9 -> [0, 1]
          example [3, 2, 4], 6 -> [1, 2]

          var i: Int = 0
          while i < length(nums) do
              var j: Int = i + 1
              while j < length(nums) do
                  if nums[i] + nums[j] == target then
                      return [i, j]
                  end if
                  j = j + 1
              end while
              i = i + 1
          end while

          return []
      end func two_sum
    python: |
      def two_sum(nums: list[int], target: int) -> list[int]:
          for i in range(len(nums)):
              for j in range(i + 1, len(nums)):
                  if nums[i] + nums[j] == target:
                      return [i, j]
          return []
  metadata:
    tags: ["array", "hash-map", "two-pointers"]
    source: "LeetCode #1"
    time_complexity: "O(n^2)"
    space_complexity: "O(1)"
    constructs_tested: ["function", "nested-while", "if", "list-literal"]
