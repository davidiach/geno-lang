problem:
  id: "PROB-012"
  name: "Reverse List"
  difficulty: "easy"
  domain: "arrays"
  description: |
    Write a function that reverses a list of integers.
  signature:
    function_name: "reverse_list"
    inputs:
      - name: "arr"
        type: "List[Int]"
    output:
      name: "result"
      type: "List[Int]"
  examples:
    visible:
      - input: [[1, 2, 3, 4, 5]]
        output: [5, 4, 3, 2, 1]
        description: "Reverse sequence"
      - input: [[]]
        output: []
        description: "Empty list"
    hidden:
      - input: [[1]]
        output: [1]
        description: "Single element"
      - input: [[1, 1]]
        output: [1, 1]
        description: "Two same elements"
      - input: [[1, 2]]
        output: [2, 1]
        description: "Two elements"
      - input: [[-1, 0, 1]]
        output: [1, 0, -1]
        description: "Mixed signs"
  constraints:
    - "Return a new list in reverse order"
  canonical_solutions:
    geno: |
      func reverse_list(arr: List[Int]) -> List[Int]
          example [1, 2, 3, 4, 5] -> [5, 4, 3, 2, 1]
          example [] -> []

          var result: List[Int] = []
          var i: Int = length(arr) - 1

          while i >= 0 do
              result = append(result, arr[i])
              i = i - 1
          end while

          return result
      end func reverse_list
    python: |
      def reverse_list(arr: list[int]) -> list[int]:
          return arr[::-1]
  metadata:
    tags: ["list", "transformation"]
    source: "Classic"
    time_complexity: "O(n)"
    space_complexity: "O(n)"
    constructs_tested: ["function", "while", "list-indexing", "append"]
