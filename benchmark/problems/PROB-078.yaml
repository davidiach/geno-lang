problem:
  id: "PROB-078"
  name: "Linked List Length (ADT)"
  difficulty: "medium"
  domain: "linked"
  description: |
    Write a function that takes a list of integers, builds a linked list
    from them using an algebraic data type, and recursively returns the
    number of nodes in that linked list.

    Define a linked list type with Nil (empty) and Cons (element + rest)
    constructors.
  signature:
    function_name: "linked_length"
    inputs:
      - name: "nums"
        type: "List[Int]"
    output:
      name: "result"
      type: "Int"
  examples:
    visible:
      - input: [[1, 2, 3]]
        output: 3
        description: "Three nodes"
      - input: [[]]
        output: 0
        description: "Empty list"
      - input: [[42]]
        output: 1
        description: "Single node"
    hidden:
      - input: [[10, 20, 30, 40]]
        output: 4
        description: "Four nodes"
      - input: [[-1, 1, -1, 1, 0]]
        output: 5
        description: "Values do not affect length"
      - input: [[0, 0, 0]]
        output: 3
        description: "Repeated zero values"
      - input: [[5, -5, 10, -10, 15, -15]]
        output: 6
        description: "Mixed positive and negative values"
  constraints:
    - "Define a linked list ADT"
    - "Build the linked list from the input array"
    - "Use recursive pattern matching to compute the length"
  canonical_solutions:
    geno: |
      type LList = Nil | Cons(value: Int, rest: LList)

      func build_list(nums: List[Int], index: Int) -> LList
          example [], 0 -> Nil

          if index >= length(nums) then
              return Nil
          else
              return Cons(nums[index], build_list(nums, index + 1))
          end if
      end func build_list

      func linked_node_length(ll: LList) -> Int
          example Nil -> 0

          match ll with
              | Nil -> return 0
              | Cons(value, rest) -> return 1 + linked_node_length(rest)
          end match
      end func linked_node_length

      func linked_length(nums: List[Int]) -> Int
          example [1, 2, 3] -> 3
          example [] -> 0

          let ll: LList = build_list(nums, 0)
          return linked_node_length(ll)
      end func linked_length
    python: |
      def linked_length(nums: list[int]) -> int:
          return len(nums)
  metadata:
    tags: ["linked-list", "adt", "recursion", "pattern-matching"]
    source: "Original"
    time_complexity: "O(n)"
    space_complexity: "O(n)"
    constructs_tested: ["type", "match", "constructor", "field-destructuring", "recursion", "function", "multi-function", "if-else"]
