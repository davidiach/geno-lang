problem:
  id: "PROB-073"
  name: "Longest Increasing Subsequence Length"
  difficulty: "hard"
  domain: "dp"
  description: |
    Write a function that computes the length of the longest strictly
    increasing subsequence of a list of integers.

    For example, in [10, 9, 2, 5, 3, 7, 101, 18], the longest increasing
    subsequence is [2, 3, 7, 101] with length 4.
  signature:
    function_name: "lis_length"
    inputs:
      - name: "nums"
        type: "List[Int]"
    output:
      name: "result"
      type: "Int"
  examples:
    visible:
      - input: [[10, 9, 2, 5, 3, 7, 101, 18]]
        output: 4
        description: "[2, 3, 7, 101] or [2, 5, 7, 101]"
      - input: [[0, 1, 0, 3, 2, 3]]
        output: 4
        description: "[0, 1, 2, 3]"
      - input: [[7, 7, 7, 7]]
        output: 1
        description: "All equal, strictly increasing"
    hidden:
      - input: [[]]
        output: 0
        description: "Empty list"
      - input: [[5]]
        output: 1
        description: "Single element"
      - input: [[1, 2, 3, 4, 5]]
        output: 5
        description: "Already increasing"
      - input: [[5, 4, 3, 2, 1]]
        output: 1
        description: "Decreasing sequence"
      - input: [[3, 1, 4, 1, 5, 9, 2, 6]]
        output: 4
        description: "[1, 4, 5, 9] or [3, 4, 5, 9] etc."
  constraints:
    - "Subsequence must be strictly increasing"
    - "Elements need not be contiguous"
  canonical_solutions:
    geno: |
      func lis_length(nums: List[Int]) -> Int
          example [10, 9, 2, 5, 3, 7, 101, 18] -> 4
          example [0, 1, 0, 3, 2, 3] -> 4

          let n: Int = length(nums)
          if n == 0 then
              return 0
          end if

          // dp[i] = length of LIS ending at index i
          var dp: List[Int] = []
          var i: Int = 0
          while i < n do
              dp = append(dp, 1)
              i = i + 1
          end while

          i = 1
          while i < n do
              var j: Int = 0
              while j < i do
                  if nums[j] < nums[i] then
                      if dp[j] + 1 > dp[i] then
                          dp = set_at(list: dp, index: i, value: dp[j] + 1)
                      end if
                  end if
                  j = j + 1
              end while
              i = i + 1
          end while

          // Find maximum in dp
          var best: Int = 0
          i = 0
          while i < n do
              if dp[i] > best then
                  best = dp[i]
              end if
              i = i + 1
          end while

          return best
      end func lis_length
    python: |
      def lis_length(nums: list[int]) -> int:
          if not nums:
              return 0
          n = len(nums)
          dp = [1] * n
          for i in range(1, n):
              for j in range(i):
                  if nums[j] < nums[i]:
                      dp[i] = max(dp[i], dp[j] + 1)
          return max(dp)
  metadata:
    tags: ["dynamic-programming", "subsequence", "optimization"]
    source: "LeetCode #300"
    time_complexity: "O(n^2)"
    space_complexity: "O(n)"
    constructs_tested: ["function", "while", "nested-while", "if-else", "set_at", "list-mutation", "named-arguments"]
