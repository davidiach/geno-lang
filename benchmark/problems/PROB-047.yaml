problem:
  id: "PROB-047"
  name: "Contains Duplicate"
  difficulty: "easy"
  domain: "arrays"
  description: |
    Given an integer array, return true if any value appears at least twice,
    and false if every element is distinct.
  signature:
    function_name: "contains_duplicate"
    inputs:
      - name: "nums"
        type: "List[Int]"
    output:
      name: "result"
      type: "Bool"
  examples:
    visible:
      - input: [[1, 2, 3, 1]]
        output: true
        description: "1 appears twice"
      - input: [[1, 2, 3, 4]]
        output: false
        description: "All distinct"
    hidden:
      - input: [[]]
        output: false
        description: "Empty list"
      - input: [[1]]
        output: false
        description: "Single element"
      - input: [[1, 1]]
        output: true
        description: "Two same"
      - input: [[1, 1, 1, 1]]
        output: true
        description: "All same"
      - input: [[-1, -1]]
        output: true
        description: "Negative duplicates"
  constraints:
    - "Check for any duplicate"
  canonical_solutions:
    geno: |
      func contains_duplicate(nums: List[Int]) -> Bool
          example [1, 2, 3, 1] -> true
          example [1, 2, 3, 4] -> false

          var i: Int = 0
          while i < length(nums) do
              var j: Int = i + 1
              while j < length(nums) do
                  if nums[i] == nums[j] then
                      return true
                  end if
                  j = j + 1
              end while
              i = i + 1
          end while

          return false
      end func contains_duplicate
    python: |
      def contains_duplicate(nums: list[int]) -> bool:
          return len(nums) != len(set(nums))
  metadata:
    tags: ["array", "hash-set"]
    source: "LeetCode #217"
    time_complexity: "O(n^2)"
    space_complexity: "O(1)"
    constructs_tested: ["function", "nested-while", "if", "early-return"]
