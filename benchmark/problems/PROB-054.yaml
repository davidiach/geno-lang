problem:
  id: "PROB-054"
  name: "Range Sum"
  difficulty: "easy"
  domain: "arrays"
  description: |
    Given an integer array and two indices left and right (inclusive),
    return the sum of elements between left and right indices.
  signature:
    function_name: "range_sum"
    inputs:
      - name: "nums"
        type: "List[Int]"
      - name: "left"
        type: "Int"
      - name: "right"
        type: "Int"
    output:
      name: "result"
      type: "Int"
  examples:
    visible:
      - input: [[1, 2, 3, 4, 5], 1, 3]
        output: 9
        description: "2 + 3 + 4 = 9"
      - input: [[1, 2, 3], 0, 2]
        output: 6
        description: "Entire array"
    hidden:
      - input: [[5], 0, 0]
        output: 5
        description: "Single element"
      - input: [[1, 2, 3, 4, 5], 0, 0]
        output: 1
        description: "First element"
      - input: [[1, 2, 3, 4, 5], 4, 4]
        output: 5
        description: "Last element"
      - input: [[-1, -2, -3], 0, 2]
        output: -6
        description: "Negative numbers"
  constraints:
    - "0 <= left <= right < length(nums)"
  canonical_solutions:
    geno: |
      func range_sum(nums: List[Int], left: Int, right: Int) -> Int
          requires left >= 0
          requires right < length(nums)
          requires left <= right
          example [1, 2, 3, 4, 5], 1, 3 -> 9
          example [1, 2, 3], 0, 2 -> 6

          var total: Int = 0
          var i: Int = left

          while i <= right do
              total = total + nums[i]
              i = i + 1
          end while

          return total
      end func range_sum
    python: |
      def range_sum(nums: list[int], left: int, right: int) -> int:
          return sum(nums[left:right + 1])
  metadata:
    tags: ["array", "sum"]
    source: "LeetCode #303"
    time_complexity: "O(n)"
    space_complexity: "O(1)"
    constructs_tested: ["function", "while", "range-iteration"]
