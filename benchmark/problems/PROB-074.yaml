problem:
  id: "PROB-074"
  name: "Topological Sort"
  difficulty: "hard"
  domain: "graphs"
  description: |
    Write a function that performs a topological sort on a directed acyclic
    graph (DAG). Given n nodes (0 to n-1) and directed edges [from, to],
    return a valid topological ordering.

    Use Kahn's algorithm (BFS-based) with in-degree tracking.
  signature:
    function_name: "topo_sort"
    inputs:
      - name: "n"
        type: "Int"
      - name: "edges"
        type: "List[List[Int]]"
    output:
      name: "result"
      type: "List[Int]"
  examples:
    visible:
      - input: [4, [[0, 1], [0, 2], [1, 3], [2, 3]]]
        output: [0, 1, 2, 3]
        description: "Diamond DAG"
      - input: [3, [[0, 1], [1, 2]]]
        output: [0, 1, 2]
        description: "Linear chain"
      - input: [2, []]
        output: [0, 1]
        description: "No edges"
    hidden:
      - input: [1, []]
        output: [0]
        description: "Single node"
      - input: [4, [[3, 2], [2, 1], [1, 0]]]
        output: [3, 2, 1, 0]
        description: "Reverse linear"
      - input: [5, [[0, 1], [0, 2], [1, 3], [2, 3], [3, 4]]]
        output: [0, 1, 2, 3, 4]
        description: "Longer diamond"
  constraints:
    - "Input is a valid DAG (no cycles)"
    - "Return any valid topological ordering"
    - "Nodes are numbered 0 to n-1"
  canonical_solutions:
    geno: |
      func topo_sort(n: Int, edges: List[List[Int]]) -> List[Int]
          example 4, [[0, 1], [0, 2], [1, 3], [2, 3]] -> [0, 1, 2, 3]
          example 3, [[0, 1], [1, 2]] -> [0, 1, 2]

          // Build adjacency list and in-degree count
          var adj: List[List[Int]] = []
          var indegree: List[Int] = []
          var i: Int = 0

          while i < n do
              adj = append(adj, [])
              indegree = append(indegree, 0)
              i = i + 1
          end while

          i = 0
          while i < length(edges) do
              let from_node: Int = edges[i][0]
              let to_node: Int = edges[i][1]
              adj = set_at(list: adj, index: from_node, value: append(adj[from_node], to_node))
              indegree = set_at(list: indegree, index: to_node, value: indegree[to_node] + 1)
              i = i + 1
          end while

          // Find initial zero in-degree nodes
          var queue: List[Int] = []
          i = 0
          while i < n do
              if indegree[i] == 0 then
                  queue = append(queue, i)
              end if
              i = i + 1
          end while

          // Process queue
          var result: List[Int] = []
          while length(queue) > 0 do
              let curr: Int = head(queue)
              queue = tail(queue)
              result = append(result, curr)

              let neighbors: List[Int] = adj[curr]
              var j: Int = 0
              while j < length(neighbors) do
                  let nb: Int = neighbors[j]
                  let new_deg: Int = indegree[nb] - 1
                  indegree = set_at(list: indegree, index: nb, value: new_deg)
                  if new_deg == 0 then
                      queue = append(queue, nb)
                  end if
                  j = j + 1
              end while
          end while

          return result
      end func topo_sort
    python: |
      def topo_sort(n: int, edges: list[list[int]]) -> list[int]:
          adj = [[] for _ in range(n)]
          indegree = [0] * n
          for u, v in edges:
              adj[u].append(v)
              indegree[v] += 1
          queue = [i for i in range(n) if indegree[i] == 0]
          result = []
          qi = 0
          while qi < len(queue):
              node = queue[qi]
              qi += 1
              result.append(node)
              for nb in adj[node]:
                  indegree[nb] -= 1
                  if indegree[nb] == 0:
                      queue.append(nb)
          return result
  metadata:
    tags: ["graph", "topological-sort", "bfs", "dag"]
    source: "Classic"
    time_complexity: "O(V + E)"
    space_complexity: "O(V + E)"
    constructs_tested: ["function", "while", "if-else", "set_at", "append", "named-arguments"]
