problem:
  id: "PROB-006"
  name: "Sum of List"
  difficulty: "trivial"
  domain: "arrays"
  description: |
    Write a function that returns the sum of all elements in a list of integers.
  signature:
    function_name: "sum_list"
    inputs:
      - name: "arr"
        type: "List[Int]"
    output:
      name: "result"
      type: "Int"
  examples:
    visible:
      - input: [[1, 2, 3, 4, 5]]
        output: 15
        description: "Sum of 1 to 5"
      - input: [[]]
        output: 0
        description: "Empty list"
    hidden:
      - input: [[10]]
        output: 10
        description: "Single element"
      - input: [[-1, -2, -3]]
        output: -6
        description: "Negative numbers"
      - input: [[-5, 5]]
        output: 0
        description: "Canceling numbers"
      - input: [[100, 200, 300]]
        output: 600
        description: "Large numbers"
  constraints:
    - "Return 0 for empty list"
  canonical_solutions:
    geno: |
      func sum_list(arr: List[Int]) -> Int
          example [1, 2, 3, 4, 5] -> 15
          example [] -> 0

          var total: Int = 0
          var i: Int = 0

          while i < length(arr) do
              total = total + arr[i]
              i = i + 1
          end while

          return total
      end func sum_list
    python: |
      def sum_list(arr: list[int]) -> int:
          return sum(arr)
  metadata:
    tags: ["list", "accumulation", "loop"]
    source: "Original"
    time_complexity: "O(n)"
    space_complexity: "O(1)"
    constructs_tested: ["function", "while", "list-indexing", "variable"]
