problem:
  id: "PROB-077"
  name: "Mini Calculator"
  difficulty: "expert"
  domain: "systems"
  description: |
    Write a function that evaluates a simple arithmetic expression given as
    a string. The expression contains non-negative integers and the operators
    +, -, *, with standard precedence (* before +/-). No parentheses.

    For example, "2+3*4" evaluates to 14 (not 20).

    Spaces may appear around operators and numbers.
  signature:
    function_name: "calculate"
    inputs:
      - name: "expr"
        type: "String"
    output:
      name: "result"
      type: "Int"
  examples:
    visible:
      - input: "2 + 3 * 4"
        output: 14
        description: "Precedence: 2 + 12 = 14"
      - input: "10 - 3 - 2"
        output: 5
        description: "Left-to-right: (10 - 3) - 2 = 5"
      - input: "42"
        output: 42
        description: "Single number"
    hidden:
      - input: "1 + 2 + 3"
        output: 6
        description: "All addition"
      - input: "2 * 3 * 4"
        output: 24
        description: "All multiplication"
      - input: "10 + 2 * 3 - 1"
        output: 15
        description: "Mixed: 10 + 6 - 1"
      - input: "0 * 100 + 5"
        output: 5
        description: "Zero multiplication"
      - input: "100"
        output: 100
        description: "Larger single number"
  constraints:
    - "Operators are +, -, *"
    - "Standard precedence: * binds tighter than +/-"
    - "Left-to-right associativity"
    - "No parentheses"
    - "All numbers are non-negative integers"
  canonical_solutions:
    geno: |
      func is_digit_char(c: String) -> Bool
          example "5" -> true
          example "+" -> false

          return c == "0" or c == "1" or c == "2" or c == "3" or c == "4" or c == "5" or c == "6" or c == "7" or c == "8" or c == "9"
      end func is_digit_char

      func digit_value(c: String) -> Int
          example "0" -> 0
          example "5" -> 5

          if c == "0" then
              return 0
          end if
          if c == "1" then
              return 1
          end if
          if c == "2" then
              return 2
          end if
          if c == "3" then
              return 3
          end if
          if c == "4" then
              return 4
          end if
          if c == "5" then
              return 5
          end if
          if c == "6" then
              return 6
          end if
          if c == "7" then
              return 7
          end if
          if c == "8" then
              return 8
          end if
          return 9
      end func digit_value

      func calculate(expr: String) -> Int
          example "2 + 3 * 4" -> 14
          example "10 - 3 - 2" -> 5

          let chars: List[String] = to_chars(expr)
          let n: Int = length(chars)

          // Tokenize into numbers and operators
          var nums: List[Int] = []
          var ops: List[String] = []
          var i: Int = 0
          var current_num: Int = 0
          var in_number: Bool = false

          while i < n do
              let c: String = chars[i]
              if is_digit_char(c) then
                  current_num = current_num * 10 + digit_value(c)
                  in_number = true
              else
                  if in_number then
                      nums = append(nums, current_num)
                      current_num = 0
                      in_number = false
                  end if
                  if c == "+" or c == "-" or c == "*" then
                      ops = append(ops, c)
                  end if
              end if
              i = i + 1
          end while

          if in_number then
              nums = append(nums, current_num)
          end if

          // First pass: handle * (higher precedence)
          var nums2: List[Int] = [head(nums)]
          var ops2: List[String] = []
          i = 0

          while i < length(ops) do
              if ops[i] == "*" then
                  let prev: Int = nums2[length(nums2) - 1]
                  let product: Int = prev * nums[i + 1]
                  nums2 = set_at(list: nums2, index: length(nums2) - 1, value: product)
              else
                  nums2 = append(nums2, nums[i + 1])
                  ops2 = append(ops2, ops[i])
              end if
              i = i + 1
          end while

          // Second pass: handle + and - (left to right)
          var result: Int = head(nums2)
          i = 0

          while i < length(ops2) do
              if ops2[i] == "+" then
                  result = result + nums2[i + 1]
              else
                  result = result - nums2[i + 1]
              end if
              i = i + 1
          end while

          return result
      end func calculate
    python: |
      def calculate(expr: str) -> int:
          chars = list(expr)
          n = len(chars)
          nums = []
          ops = []
          i = 0
          current_num = 0
          in_number = False
          while i < n:
              c = chars[i]
              if c.isdigit():
                  current_num = current_num * 10 + int(c)
                  in_number = True
              else:
                  if in_number:
                      nums.append(current_num)
                      current_num = 0
                      in_number = False
                  if c in '+-*':
                      ops.append(c)
              i += 1
          if in_number:
              nums.append(current_num)
          nums2 = [nums[0]]
          ops2 = []
          for i, op in enumerate(ops):
              if op == '*':
                  nums2[-1] *= nums[i + 1]
              else:
                  nums2.append(nums[i + 1])
                  ops2.append(op)
          result = nums2[0]
          for i, op in enumerate(ops2):
              if op == '+':
                  result += nums2[i + 1]
              else:
                  result -= nums2[i + 1]
          return result
  metadata:
    tags: ["parsing", "calculator", "expression-evaluation", "multi-pass"]
    source: "LeetCode #227"
    time_complexity: "O(n)"
    space_complexity: "O(n)"
    constructs_tested: ["function", "while", "if-else", "to_chars", "set_at", "multi-function", "named-arguments"]
