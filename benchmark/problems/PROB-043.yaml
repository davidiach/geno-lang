problem:
  id: "PROB-043"
  name: "Maximum Subarray"
  difficulty: "medium"
  domain: "dp"
  description: |
    Given an integer array, find the contiguous subarray with the largest sum
    and return its sum.
  signature:
    function_name: "max_subarray"
    inputs:
      - name: "nums"
        type: "List[Int]"
    output:
      name: "result"
      type: "Int"
  examples:
    visible:
      - input: [[-2, 1, -3, 4, -1, 2, 1, -5, 4]]
        output: 6
        description: "Subarray [4,-1,2,1] has sum 6"
      - input: [[1]]
        output: 1
        description: "Single element"
    hidden:
      - input: [[5, 4, -1, 7, 8]]
        output: 23
        description: "Entire array"
      - input: [[-1]]
        output: -1
        description: "Single negative"
      - input: [[-2, -1]]
        output: -1
        description: "All negative"
      - input: [[1, 2, 3]]
        output: 6
        description: "All positive"
      - input: [[-1, -2, 5, -1, 6]]
        output: 10
        description: "Middle subarray"
  constraints:
    - "Array has at least one element"
  canonical_solutions:
    geno: |
      func max_subarray(nums: List[Int]) -> Int
          requires length(nums) > 0
          example [-2, 1, -3, 4, -1, 2, 1, -5, 4] -> 6
          example [1] -> 1

          var max_sum: Int = nums[0]
          var curr_sum: Int = nums[0]
          var i: Int = 1

          while i < length(nums) do
              curr_sum = max(nums[i], curr_sum + nums[i])
              max_sum = max(max_sum, curr_sum)
              i = i + 1
          end while

          return max_sum
      end func max_subarray
    python: |
      def max_subarray(nums: list[int]) -> int:
          max_sum = curr_sum = nums[0]
          for num in nums[1:]:
              curr_sum = max(num, curr_sum + num)
              max_sum = max(max_sum, curr_sum)
          return max_sum
  metadata:
    tags: ["dynamic-programming", "kadane"]
    source: "LeetCode #53"
    time_complexity: "O(n)"
    space_complexity: "O(1)"
    constructs_tested: ["function", "while", "max"]
