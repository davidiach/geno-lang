problem:
  id: "PROB-064"
  name: "BST Height"
  difficulty: "medium"
  domain: "trees"
  description: |
    Write a function that builds a binary search tree by inserting integers
    from a list (left-to-right), then returns the height of the tree.
    An empty tree has height 0. A single node has height 1.

    Your solution must define an algebraic data type for the tree and use
    pattern matching with recursion.
  signature:
    function_name: "bst_height"
    inputs:
      - name: "values"
        type: "List[Int]"
    output:
      name: "result"
      type: "Int"
  examples:
    visible:
      - input: [[5, 3, 7, 1, 4]]
        output: 3
        description: "Balanced-ish BST, height 3"
      - input: [[]]
        output: 0
        description: "Empty tree"
      - input: [[1, 2, 3, 4]]
        output: 4
        description: "Degenerate right-skewed tree"
    hidden:
      - input: [[42]]
        output: 1
        description: "Single node"
      - input: [[5, 3, 7]]
        output: 2
        description: "Simple balanced tree"
      - input: [[4, 3, 2, 1]]
        output: 4
        description: "Degenerate left-skewed tree"
      - input: [[10, 5, 15, 3, 7, 12, 20]]
        output: 3
        description: "Fully balanced tree"
      - input: [[1, 1, 1]]
        output: 3
        description: "Duplicates go right"
  constraints:
    - "Insert values left-to-right into BST"
    - "Duplicate values go to the right subtree"
    - "Height of empty tree is 0"
  canonical_solutions:
    geno: |
      type Tree = Empty | Node(val: Int, left: Tree, right: Tree)

      func insert(tree: Tree, value: Int) -> Tree
          example Empty, 5 -> Node(5, Empty, Empty)

          match tree with
              | Empty ->
                  return Node(value, Empty, Empty)
              | Node(v, l, r) ->
                  if value < v then
                      return Node(v, insert(l, value), r)
                  else
                      return Node(v, l, insert(r, value))
                  end if
          end match
      end func insert

      func height(tree: Tree) -> Int
          example Empty -> 0

          match tree with
              | Empty -> return 0
              | Node(_, l, r) ->
                  let lh: Int = height(l)
                  let rh: Int = height(r)
                  return 1 + max(lh, rh)
          end match
      end func height

      func bst_height(values: List[Int]) -> Int
          example [5, 3, 7, 1, 4] -> 3
          example [] -> 0

          var tree: Tree = Empty
          var i: Int = 0

          while i < length(values) do
              tree = insert(tree, values[i])
              i = i + 1
          end while

          return height(tree)
      end func bst_height
    python: |
      def bst_height(values: list[int]) -> int:
          if not values:
              return 0
          tree = None
          def insert(node, val):
              if node is None:
                  return [val, None, None]
              if val < node[0]:
                  node[1] = insert(node[1], val)
              else:
                  node[2] = insert(node[2], val)
              return node
          def height(node):
              if node is None:
                  return 0
              return 1 + max(height(node[1]), height(node[2]))
          for v in values:
              tree = insert(tree, v)
          return height(tree)
  metadata:
    tags: ["tree", "bst", "adt", "recursion", "pattern-matching"]
    source: "Classic"
    time_complexity: "O(n^2)"
    space_complexity: "O(n)"
    constructs_tested: ["type", "match", "constructor", "field-destructuring", "recursion", "function", "while", "multi-function"]
